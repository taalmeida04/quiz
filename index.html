<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurassic Park Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay">

        <div class="login-container">

            <img src="img/image (1).png" alt="Jurassic Park" class="logo">

            <h2>Faça login para continuar</h2>

            <input
                type="email"
                id="exampleFormControlInput1"
                placeholder="E-mail"
            >

            <input
                type="password"
                id="inputPassword"
                placeholder="Senha"
            >

            <button class="btn">Login</button>

        </div>

        <div class="info-box">
            <h3>VOCÊ CONSEGUE ESCAPAR DE JURASSIC PARK?</h3>

            <p>
                Uma falha elétrica atingiu a Ilha Nublar.
                As cercas de contenção foram desligadas,
                os sistemas de segurança estão fora de controle
                e os dinossauros estão soltos.
            </p>

            <p>
                Agora tudo depende das suas decisões.
            </p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
